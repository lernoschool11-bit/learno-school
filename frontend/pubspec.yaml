name: learno_app
description: "Learno - Educational Social Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^3.1.2
  http: ^1.6.0
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  socket_io_client: ^3.1.4
  image_picker: ^1.2.1
  http_parser: ^4.1.2
  video_player: ^2.8.0
  google_generative_ai: ^0.4.0
  file_picker: ^8.2.1
  webview_flutter: ^4.10.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/character.riv
    - assets/character_logo.json